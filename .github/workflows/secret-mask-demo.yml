name: Secret Mask Demo

on: [push]

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Mostrar secreto crudo (GitHub lo enmascara automáticamente)
        env:
          SECRET_REPO: ${{ secrets.SECRET_REPO }}
        run: |
          echo "Raw secret: $SECRET_REPO"

      - name: Mostrar secreto modificado (no enmascarado por defecto)
        env:
          SECRET_REPO: ${{ secrets.SECRET_REPO }}
        run: |
          MOD="${SECRET_REPO}-suffix"
          echo "Modified (no mask expected): $MOD"

      - name: Enmascarar el valor modificado con "::add-mask::"
        env:
          SECRET_REPO: ${{ secrets.SECRET_REPO }}
        run: |
          MOD="${SECRET_REPO}-suffix"
          echo "::add-mask::$MOD"
          echo "After add-mask: $MOD"
