name: Workflow Dispatcher

on: 
  push:
    branches: [main]

jobs:
  dispatcher:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Disparar workflow-receiver
        run: |
          gh workflow run workflow-receiver.yml --ref ${{ github.ref_name }}
        env:
          GH_TOKEN: ${{ secrets.CLASSIC_PAT }}
